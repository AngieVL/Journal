<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#faf6ef">
<title>Mi Agenda</title>
<link rel="manifest" href="manifest.json">
<link rel="icon" href="icons/icon-192.png">
<link rel="apple-touch-icon" href="icons/icon-192.png">
<link rel="stylesheet" href="app.css?v=8">
</head>
<body>
<div id="app">
  <header id="topbar">
    <div id="topbar-title">Mi Agenda</div>
    <div><button id="btn-plan" class="icon-btn" aria-label="Planner">✨</button>
    <button id="btn-settings" class="icon-btn" aria-label="Settings">⚙️</button></div>
  </header>
  <main id="view"></main>
  <nav id="tabbar">
    <button class="tab" data-tab="today"><span class="tab-ico">☀️</span><span class="tab-lbl" data-i18n="tab.today"></span></button>
    <button class="tab" data-tab="week"><span class="tab-ico">🗓️</span><span class="tab-lbl" data-i18n="tab.week"></span></button>
    <button class="tab" data-tab="month"><span class="tab-ico">📆</span><span class="tab-lbl" data-i18n="tab.month"></span></button>
    <button class="tab" data-tab="goals"><span class="tab-ico">🎯</span><span class="tab-lbl" data-i18n="tab.goals"></span></button>
    <button class="tab" data-tab="trackers"><span class="tab-ico">🎨</span><span class="tab-lbl" data-i18n="tab.trackers"></span></button>
  </nav>
  <div id="modal-root" class="hidden">
    <div id="modal-backdrop"></div>
    <div id="modal-card"></div>
  </div>
  <div id="toast" class="hidden"></div>
</div>
<script src="js/i18n.js?v=8"></script>
<script src="js/store.js?v=8"></script>
<script src="js/trackers.js?v=8"></script>
<script src="js/views.js?v=8"></script>
<script src="js/goals.js?v=8"></script>
<script src="js/sync.js?v=8"></script>
<script src="js/app.js?v=8"></script>
<script>
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => navigator.serviceWorker.register('sw.js'));
}
</script>
</body>
</html>
